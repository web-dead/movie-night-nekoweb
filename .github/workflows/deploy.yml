on: [workflow_dispatch]
#  schedule:
#    - cron: '0 0 * * 1'
  
jobs:
  job1:
    runs-on: ubuntu-latest
    name: setup
    outputs:
        pointerResult: ${{ steps.run_changeNamePointer.outputs.result }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
      - id: install_actionsCore
        run: npm install @actions/core
      - id: create_package_json
        run: npm init -y
      - id: run_changeNamePointer
        run: node script.mjs #runs changeNamePointer
      
  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - env:
          OUTPUT1: ${{needs.job1.outputs.pointerResult}}
        run: echo "$OUTPUT1"
        
