on: [workflow_dispatch]
#  schedule:
#    - cron: '0 0 * * 1'
  
jobs:
  test:
    runs-on: ubuntu-latest
    name: deploy2nekoweb
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm init -y
      
      - name: Run JavaScript file
        run: node ./script.js

      - name: deploy2nekoweb
        uses: indiefellas/deploy2nekoweb@main
        with:
          nekoweb-api-key: ${{ secrets.NEKOWEB_API_KEY }}
          nekoweb-domain: 'web-dead.nekoweb.org'
          nekoweb-username: 'web-dead'
          directory: 'public'
