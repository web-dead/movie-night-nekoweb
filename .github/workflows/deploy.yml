on: [workflow_dispatch]
#  schedule:
#    - cron: '0 0 * * 1'
  
jobs:
  job1:
    runs-on: ubuntu-latest
    name: setup
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
      - run: npm install @actions/core
      - run: npm init -y
      - name: run script
        id: run_changeNamePointer
        run: node script.mjs #runs changeNamePointer
        
      - name: Get the new pointynumber
        run: echo "${{ steps.run_changeNamePointer.outputs.pointerResult }}"

      - name: Update Json File
        uses: restackio/update-json-file-action@2.1
        with:
          file: public/movie-night-order.json
          fields: "{\"turnPointer\": \"${{ steps.run_changeNamePointer.outputs.pointerResult }}\"}"
          
        
